    <main>

          <div class="container">
            <form action="" class="contact-form" id="contact-form" novalidate>

    <!-- 
    - EmailJS SDK (load before config and script)
  -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <!-- 
    - EmailJS config (your keys — add this file to .gitignore)
  -->

    <!-- 
    - EmailJS form handler
    - Placed after script.js so it runs last and the DOM is fully ready
  -->
    <script>
      // Initialise EmailJS with your public key from config.js
      emailjs.init(EMAILJS_CONFIG.publicKey);

      const form = document.getElementById("contact-form");
      const submitBtn = document.getElementById("submit-btn");
      const statusMsg = document.getElementById("form-status");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        // Basic client-side validation
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        if (!name || !email || !message) {
          showStatus("Please fill in all required fields.", "error");
          return;
        }

        // Build the template parameters — these match your EmailJS template variables
        const templateParams = {
          from_name: name,
          from_email: email,
          subject:
            document.getElementById("subject").value.trim() || "(No subject)",
          message: message,
        };

        // Disable button while sending
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending…";

        // Step 1 — Send notification email to YOU
        emailjs
          .send(
            EMAILJS_CONFIG.serviceId,
            EMAILJS_CONFIG.notificationTplId,
            templateParams
          )
          .then(function () {
            // Step 2 — Send auto-reply to the USER
            return emailjs.send(
              EMAILJS_CONFIG.serviceId,
              EMAILJS_CONFIG.autoReplyTplId,
              templateParams
            );
          })
          .then(function () {
            showStatus(
              "Message sent! I'll get back to you soon. 😊",
              "success"
            );
            form.reset();
          })
          .catch(function (error) {
            console.error("EmailJS error:", error);
            showStatus(
              "Something went wrong. Please try again or email me directly.",
              "error"
            );
          })
          .finally(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send Message";
          });
      });

      function showStatus(text, type) {
        statusMsg.textContent = text;
        statusMsg.style.display = "block";
        statusMsg.style.color =
          type === "success" ? "hsl(177, 39%, 40%)" : "hsl(0, 70%, 50%)";
      }
    </script>
